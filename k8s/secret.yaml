# Template only — never commit real values to Git.
# Inject actual values via CI/CD:
#   kubectl create secret generic basesource-secret -n basesource \
#     --from-literal=DATABASE_DSN="..." \
#     --from-literal=RABBITMQ_URL="..." \
#     ...
apiVersion: v1
kind: Secret
metadata:
  name: basesource-secret
  namespace: basesource
type: Opaque
stringData:
  DATABASE_DSN: "appuser:CHANGE_ME@tcp(mysql-service:3306)/appdb?parseTime=true&charset=utf8mb4"
  RABBITMQ_URL: "amqp://guest:CHANGE_ME@rabbitmq-service:5672/"
  KAFKA_BROKERS: "kafka-service:9092"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  NOTIFICATION_API_KEY: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"
  # MySQL StatefulSet credentials
  MYSQL_ROOT_PASSWORD: "CHANGE_ME"
  MYSQL_USER: "appuser"
  MYSQL_PASSWORD: "CHANGE_ME"
  # RabbitMQ StatefulSet credentials
  RABBITMQ_DEFAULT_USER: "CHANGE_ME"
  RABBITMQ_DEFAULT_PASS: "CHANGE_ME"
