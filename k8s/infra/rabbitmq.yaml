---
# Headless Service — required by StatefulSet for stable pod DNS (rabbitmq-0.rabbitmq-headless.basesource.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: basesource
spec:
  clusterIP: None
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
# ClusterIP Service — used by the app (RABBITMQ_URL points to rabbitmq-service:5672)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: basesource
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: basesource
spec:
  serviceName: rabbitmq-headless
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: basesource-secret
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: basesource-secret
                  key: RABBITMQ_DEFAULT_PASS
            # Long-name mode required when using FQDN as the node name
            - name: RABBITMQ_USE_LONGNAME
              value: "true"
            # Stable node name tied to the StatefulSet pod DNS — required for cluster identity and durable queue recovery
            - name: RABBITMQ_NODENAME
              value: rabbit@rabbitmq-0.rabbitmq-headless.basesource.svc.cluster.local
          ports:
            - containerPort: 5672
            - containerPort: 15672
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
