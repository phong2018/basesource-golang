apiVersion: apps/v1
kind: Deployment
metadata:
  name: basesource-api
  namespace: basesource
spec:
  replicas: 2
  selector:
    matchLabels:
      app: basesource-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: basesource-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: api
          image: basesource:local
          imagePullPolicy: Never
          args: ["api"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: basesource-config
            - secretRef:
                name: basesource-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
