apiVersion: apps/v1
kind: Deployment
metadata:
  name: basesource-worker
  namespace: basesource
spec:
  replicas: 2
  selector:
    matchLabels:
      app: basesource-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: basesource-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: worker
          image: basesource:local
          imagePullPolicy: Never
          args: ["worker"]
          envFrom:
            - configMapRef:
                name: basesource-config
            - secretRef:
                name: basesource-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
