# Local kind cluster values — DO NOT commit real credentials from production here.
apiVersion: v1
kind: Secret
metadata:
  name: basesource-secret
  namespace: basesource
type: Opaque
stringData:
  DATABASE_DSN: "appuser:apppass@tcp(mysql-service:3306)/appdb?parseTime=true&charset=utf8mb4"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq-service:5672/"
  KAFKA_BROKERS: "kafka-service:9092"
  AWS_ACCESS_KEY_ID: "local"
  AWS_SECRET_ACCESS_KEY: "local"
  NOTIFICATION_API_KEY: "local"
  MYSQL_ROOT_PASSWORD: "root"
  MYSQL_USER: "appuser"
  MYSQL_PASSWORD: "apppass"
  RABBITMQ_DEFAULT_USER: "guest"
  RABBITMQ_DEFAULT_PASS: "guest"
  JWT_SECRET: "zap-scan-secret-key-local-dev"
