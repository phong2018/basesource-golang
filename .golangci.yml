version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - noctx

  formatters:
    enable:
      - gofmt
      - goimports
    settings:
      gofmt:
        simplify: true

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
