openapi: "3.0.0"
info:
  title: Basesource API
  version: "1.0"
servers:
  - url: http://host.docker.internal:8080
paths:
  /health:
    get: {}
  /api/v1/todos:
    get: {}
    post: {}
  /api/v1/todos/{id}:
    get:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    put:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    delete:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
  /api/v1/auth/register:
    post: {}
  /api/v1/auth/login:
    post: {}
  /api/v1/auth/refresh:
    post: {}
  /api/v1/auth/logout:
    post: {}
  /api/v1/me:
    get: {}
  /api/v1/my/todos:
    get: {}
    post: {}
  /api/v1/my/todos/{id}:
    get:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    put:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    delete:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
  /api/v1/my/todos/{id}/share:
    post:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
  /api/v1/my/todos/{id}/share/{uid}:
    delete:
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
        - {name: uid, in: path, required: true, schema: {type: integer}}
  /api/v1/my/todos/{id}/attachment:
    post:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    delete:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
  /api/v1/admin/todos/bulk-delete:
    post: {}
  /api/v1/admin/todos/bulk-status:
    patch: {}
  /api/v1/todos/{id}/comments:
    get:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
    post:
      parameters: [{name: id, in: path, required: true, schema: {type: integer}}]
  /api/v1/todos/{id}/comments/{cid}:
    delete:
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
        - {name: cid, in: path, required: true, schema: {type: integer}}
